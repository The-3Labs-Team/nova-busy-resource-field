name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate composer
        run: composer validate --strict --no-check-publish

      - name: Require Nova Composer credentials
        env:
          NOVA_USERNAME: ${{ secrets.NOVA_USERNAME }}
          NOVA_LICENSE_KEY: ${{ secrets.NOVA_LICENSE_KEY }}
        run: |
          if [ -z "${NOVA_USERNAME}" ] || [ -z "${NOVA_LICENSE_KEY}" ]; then
            echo "::error::Missing Actions secrets NOVA_USERNAME and/or NOVA_LICENSE_KEY. Configure your Nova account email and license key before enabling this workflow as a required check."
            exit 1
          fi

      - name: Configure Nova Composer auth
        env:
          NOVA_USERNAME: ${{ secrets.NOVA_USERNAME }}
          NOVA_LICENSE_KEY: ${{ secrets.NOVA_LICENSE_KEY }}
        run: composer config http-basic.nova.laravel.com "${NOVA_USERNAME}" "${NOVA_LICENSE_KEY}"

      - name: Install PHP dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run PHP tests
        run: composer test

      - name: Setup Node
        if: ${{ matrix.php-version == '8.4' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Nova frontend dependencies
        if: ${{ matrix.php-version == '8.4' }}
        run: npm run nova:install

      - name: Install Node dependencies
        if: ${{ matrix.php-version == '8.4' }}
        run: npm ci

      - name: Build frontend
        if: ${{ matrix.php-version == '8.4' }}
        run: npm run build
